name: Format

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.15"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install black

      - name: Check formatting (black)
        run: black --check app/
